<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pirámide Sigma Avanzada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
        }
        .pyramid-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }
        .pyramid-level {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
            box-sizing: border-box;
            padding: 8px;
            transition: all 0.3s ease;
            clip-path: polygon(var(--tw) 0%, var(--bw) 100%, calc(100% - var(--bw)) 100%, calc(100% - var(--tw)) 0%);
        }
        .level-text {
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            line-height: 1.2;
        }
        .level-pct {
            font-weight: normal;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            opacity: 0.95;
            margin-top: 2px;
        }
        .message {
            color: #555;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="pyramid-container" id="pyramid">
        <div class="message">Conectado con Sigma. Arrastra tus columnas en el panel de datos izquierdo.</div>
    </div>

    <script>
        (function() {
            var pluginOptions = {};
            var configCallback = null;
            var rowsCallback = null;

            window.sigma = {
                plugins: {
                    config: function(config) {
                        window.parent.postMessage({ type: 'config', config: config }, '*');
                    },
                    getOptions: function() {
                        return pluginOptions;
                    },
                    getRows: function(callback) {
                        rowsCallback = callback;
                        window.parent.postMessage({ type: 'getRows' }, '*');
                    }
                }
            };

            window.addEventListener('message', function(event) {
                if (!event.data) return;
                if (event.data.type === 'options') {
                    pluginOptions = event.data.options || {};
                }
                if (event.data.type === 'rows' && rowsCallback) {
                    rowsCallback(event.data.rows);
                }
            });
        })();
    </script>
    
    <script>
        // FUNCIÓN QUE DIBUJA LA PIRÁMIDE
        function renderPyramid(rows) {
            const container = document.getElementById('pyramid');
            container.innerHTML = '';

            if (!rows || rows.length === 0) {
                container.innerHTML = '<div class="message">Por favor, asigna columnas a "NivelTexto" y "ValorNumero" en el panel de datos.</div>';
                return;
            }

            const config = sigma.plugins.getOptions() || {};
            
            let colorsInput = config.ListaColores || "#1A365D, #2B6CB0, #4299E1, #63B3ED, #90CDF4";
            let colors = colorsInput.split(',').map(c => c.trim());

            let fontSizeTxt = (config.TamanoTextoNivel || 14) + 'px';
            let fontSizePct = (config.TamanoTextoPorcentaje || 12) + 'px';

            const keys = Object.keys(rows[0]);
            const labelKey = keys[0]; 
            const valueKey = keys[1]; 

            const total = rows.reduce((sum, row) => sum + Number(row[valueKey] || 0), 0);
            const numLevels = rows.length;

            rows.forEach((row, index) => {
                const label = row[labelKey] || "Sin nombre";
                const value = Number(row[valueKey] || 0);
                const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;

                const topWidth = (index / numLevels) * 45; 
                const bottomWidth = ((index + 1) / numLevels) * 45;

                const levelDiv = document.createElement('div');
                levelDiv.className = 'pyramid-level';
                levelDiv.style.setProperty('--tw', `${topWidth}%`);
                levelDiv.style.setProperty('--bw', `${bottomWidth}%`);
                
                levelDiv.style.backgroundColor = colors[index % colors.length] || '#A0AEC0';
                levelDiv.style.width = '100%';
                levelDiv.style.height = `${Math.max(50, 380 / numLevels)}px`;

                levelDiv.innerHTML = `
                    <div class="level-text" style="font-size: ${fontSizeTxt};">${label}</div>
                    <div class="level-pct" style="font-size: ${fontSizePct};">${percentage}% (${value.toLocaleString()})</div>
                `;
                container.appendChild(levelDiv);
            });
        }

        // INICIALIZACIÓN DE VARIABLES
        sigma.plugins.config({
            source: { type: "element" },
            variables: [
                { name: "NivelTexto", type: "column", allowedTypes: ["text"], label: "1. Columna de Niveles (Texto)" },
                { name: "ValorNumero", type: "column", allowedTypes: ["integer", "number"], label: "2. Columna de Valores (Métrica)" },
                { name: "ListaColores", type: "string", defaultValue: "#1A365D, #2B6CB0, #4299E1, #63B3ED, #90CDF4", label: "3. Colores HEX (separados por comas)" },
                { name: "TamanoTextoNivel", type: "integer", defaultValue: 14, label: "4. Tamaño Texto Nivel (px)" },
                { name: "TamanoTextoPorcentaje", type: "integer", defaultValue: 12, label: "5. Tamaño Texto Porcentaje (px)" }
            ]
        });

        sigma.plugins.getRows(renderPyramid);
    </script>
</body>
</html>
