<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pirámide Sigma Profesional</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff; 
            overflow: auto; 
            width: 100%; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #placeholder {
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center; 
            height: 100vh;
            color: #6b7280; 
            gap: 12px; 
            text-align: center; 
            padding: 24px;
        }
        #placeholder p { font-size: 14px; max-width: 340px; line-height: 1.7; }
        
        #chart-container { display: none; width: 100%; max-width: 600px; padding: 14px; }
        
        .pyramid-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .pyramid-level {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
            box-sizing: border-box;
            padding: 8px;
            transition: all 0.3s ease;
            clip-path: polygon(var(--tw) 0%, var(--bw) 100%, calc(100% - var(--bw)) 100%, calc(100% - var(--tw)) 0%);
        }
        .level-text {
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            line-height: 1.2;
        }
        .level-pct {
            font-weight: normal;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            opacity: 0.95;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div id="placeholder">
        <p id="placeholder-msg">
            En el panel del editor: selecciona una <strong>Fuente de Datos (Data Source)</strong>, 
            luego asigna la columna de texto para los niveles y la métrica numérica.
        </p>
    </div>

    <div id="chart-container">
        <div class="pyramid-container" id="pyramid"></div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@sigmacomputing/plugin@1.2.0/dist/umd/sigmacomputing-plugin.umd.js" crossorigin></script>

    <script>
        (function () {
            'use strict';

            let currentConfig = {};
            let currentData = {};
            let dataUnsub = null;
            const client = SigmaPlugin.client;

            // CONFIGURACIÓN IDÉNTICA AL FORMATO VÁLIDO DE SIGMA
            client.config.configureEditorPanel([
                { name: "source", type: "element", label: "Data Source" },
                { name: "levelCol", type: "column", source: "source", label: "1. Columna de Niveles (Texto)" },
                { name: "valueCol", type: "column", source: "source", label: "2. Columna de Valores (Métrica)" },
                { name: "listaColores", type: "text", label: "3. Colores HEX (separados por comas)" },
                { name: "tamanoNivel", type: "text", label: "4. Tamaño Texto Nivel (px)" },
                { name: "tamanoPct", type: "text", label: "5. Tamaño Texto Porcentaje (px)" }
            ]);

            // Suscriptor idéntico al de tu compañera para refrescar los datos limpios
            client.config.subscribe((cfg) => {
                currentConfig = cfg || {};
                if (dataUnsub) { dataUnsub(); dataUnsub = null; }
                
                const src = currentConfig.source;
                if (src) {
                    dataUnsub = client.elements.subscribeToElementData(src, (data) => {
                        currentData = data || {};
                        rebuildAndDraw();
                    });
                } else {
                    currentData = {};
                    rebuildAndDraw();
                }
            });

            function rebuildAndDraw() {
                const lCol = currentConfig.levelCol;
                const vCol = currentConfig.valueCol;

                // Si no hay datos asignados o no existen las columnas en la tabla elegida, mostramos instrucciones
                if (!lCol || !vCol || !currentData[lCol] || currentData[lCol].length === 0) {
                    document.getElementById("placeholder").style.display = "flex";
                    document.getElementById("chart-container").style.display = "none";
                    return;
                }

                document.getElementById("placeholder").style.display = "none";
                document.getElementById("chart-container").style.display = "block";

                const container = document.getElementById('pyramid');
                container.innerHTML = '';

                // Valores por defecto si el usuario no escribe nada en los inputs de texto
                let colorsInput = currentConfig.listaColores || "#1A365D, #2B6CB0, #4299E1, #63B3ED, #90CDF4";
                let colors = colorsInput.split(',').map(c => c.trim());

                let fontSizeTxt = (currentConfig.tamanoNivel || "14") + 'px';
                let fontSizePct = (currentConfig.tamanoPct || "12") + 'px';

                const levelRows = currentData[lCol];
                const valueRows = currentData[vCol];
                const numLevels = levelRows.length;

                let total = 0;
                for (let i = 0; i < numLevels; i++) {
                    total += Number(valueRows[i] || 0);
                }

                for (let i = 0; i < numLevels; i++) {
                    const label = levelRows[i] || "Sin nombre";
                    const value = Number(valueRows[i] || 0);
                    const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;

                    const topWidth = (i / numLevels) * 45; 
                    const bottomWidth = ((i + 1) / numLevels) * 45;

                    const levelDiv = document.createElement('div');
                    levelDiv.className = 'pyramid-level';
                    levelDiv.style.setProperty('--tw', `${topWidth}%`);
                    levelDiv.style.setProperty('--bw', `${bottomWidth}%`);
                    
                    levelDiv.style.backgroundColor = colors[i % colors.length] || '#A0AEC0';
                    levelDiv.style.width = '100%';
                    levelDiv.style.height = `${Math.max(50, 380 / numLevels)}px`;

                    levelDiv.innerHTML = `
                        <div class="level-text" style="font-size: ${fontSizeTxt};">${label}</div>
                        <div class="level-pct" style="font-size: ${fontSizePct};">${percentage}% (${value.toLocaleString()})</div>
                    `;
                    container.appendChild(levelDiv);
                }
            }
        })();
    </script>
</body>
</html>
